project: fixture-app
baseUrl: http://127.0.0.1:4710
roles:
  - name: admin
crawl:
  maxPages: 5
  maxDepth: 2
  ignoreRobots: true
generation:
  maxScenariosPerPage: 3
  categories: [navigation, positive]
  fallbackSmoke: true
run:
  suiteTag: fixture-app-anonymous
  testLevel: system
  browsers: [chromium]
  locales: []
  nonFunctional:
    a11y: false        # flip true when @axe-core/playwright is desired
    vitals: true       # capture LCP/CLS/INP/TTFB per scenario
    securityHeaders: true
    a11yFailOn: []     # e.g. [serious, critical] to gate the run
  junit: true          # reports/junit/{runId}.xml
  testPlan: true       # reports/test-plans/{runId}.json
  persistDefects: true # one row per failed scenario when DB available
  prComment: true      # posts on GitHub when GITHUB_TOKEN/REPOSITORY/PR set
