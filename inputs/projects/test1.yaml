project: test1
baseUrl: http://localhost:3000
roles:
  - name: admin
    authRecipe: inputs/auth/test1.yaml
crawl:
  maxPages: 2
  maxDepth: 1
  maxConcurrency: 2
  perHostQps: 2
  includeSubdomains: false
  ignoreRobots: false
generation:
  outputDir: tests/generated
  maxScenariosPerPage: 14
  fallbackSmoke: true
run:
  testLevel: system
  browsers:
    - chromium
  locales: []
  nonFunctional:
    a11y: true
    a11yFailOn: []
    vitals: true
    securityHeaders: true
  junit: true
  testPlan: true
  persistDefects: true
  prComment: false
  suiteTag: test1
