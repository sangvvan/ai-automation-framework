# AI provider routing (ADR-003)
defaultProvider: codex
providers:
  claude:
    enabled: false
    model: claude-opus-4-7
    timeoutMs: 60000
  gemini:
    enabled: false
    model: gemini-1.5-pro
    baseUrl: https://generativelanguage.googleapis.com/v1beta/openai/
    timeoutMs: 60000
  codex:
    enabled: true
    model: o3-mini
    baseUrl: https://api.openai.com/v1
    timeoutMs: 60000
  opencode:
    enabled: false
    baseUrl: http://localhost:1234/v1
    model: google/gemma-4-26b-a4b
    timeoutMs: 120000
  opencode-ollama:
    enabled: false
    baseUrl: http://localhost:11434/v1
    model: llama3.1
    timeoutMs: 120000
  mock:
    enabled: true
fallbackChain:
  design:
    - claude
    - gemini
    - codex
    - opencode
  validate:
    - gemini
    - codex
    - claude
