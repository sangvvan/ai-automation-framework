# AI provider routing (ADR-003)
defaultProvider: opencode-ollama
providers:
  claude:
    enabled: false
    model: claude-sonnet-4-6
    timeoutMs: 60000
  gemini:
    enabled: true
    model: gemini-1.5-pro
    baseUrl: https://generativelanguage.googleapis.com/v1beta/openai/
    timeoutMs: 60000
  codex:
    enabled: true
    model: gpt-5.5
    baseUrl: https://api.openai.com/v1
    timeoutMs: 120000
  opencode:
    enabled: false
    baseUrl: http://localhost:1234/v1
    model: google/gemma-4-26b-a4b
    timeoutMs: 120000
  opencode-ollama:
    enabled: true
    baseUrl: http://localhost:11434/v1
    model: qwen3.6:27b
    timeoutMs: 120000
  mock:
    enabled: true
fallbackChain:
  design:
    - opencode-ollama
    - gemini
    - codex
    - claude
  validate:
    - opencode-ollama
    - gemini
    - codex
    - claude
