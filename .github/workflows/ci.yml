name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  quality:
    name: Type + Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint

  unit:
    name: Unit + Integration (Vitest)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: app_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd="pg_isready -U app"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    env:
      DATABASE_URL: postgresql://app:app@localhost:5432/app_test
      SESSION_SECRET: ci-session-secret-at-least-32-chars-long-enough
      AI_TEST_DEFAULT_PROVIDER: mock
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Apply migrations
        run: |
          for f in db/migrations/*.sql; do
            psql "$DATABASE_URL" -f "$f"
          done
      - run: npm run test -- --coverage

  e2e:
    name: Playwright E2E (fixture app)
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://app:app@localhost:5432/app_test
      SESSION_SECRET: ci-session-secret-at-least-32-chars-long-enough
      AI_TEST_DEFAULT_PROVIDER: mock
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Start fixture app
        run: node tests/fixtures/sample-app/server.mjs &
      - name: Smoke run (testcase)
        run: |
          sleep 2
          npm run ai-test -- run \
            --url http://127.0.0.1:4710/login.html \
            --test-case tests/fixtures/test-cases/login.yaml \
            --mode testcase
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-test-report
          path: reports/

  secret-scan:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
